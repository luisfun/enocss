<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Enocss Playground — ナビ</title>
	<style>
		:root{
			--bg:#f5f5f7;
			--card:#ffffff;
			--text:#0b0b0b;
			--muted:#6b6b6b;
			--button-bg:#111827;
			--button-text:#ffffff;
			--shadow:0 6px 18px rgba(0,0,0,.06);
		}
		@media (prefers-color-scheme: dark){
			:root{
				--bg:#0b0b0c;
				--card:#0f0f10;
				--text:#e6e6e6;
				--muted:#9e9e9e;
				--button-bg:#e5e7eb;
				--button-text:#0b0b0c;
				--shadow:0 6px 18px rgba(0,0,0,.6);
			}
		}

		html,body{height:100%}
		body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:var(--bg);color:var(--text)}
		.container{background:var(--card);padding:2rem;border-radius:12px;box-shadow:var(--shadow);min-width:280px}
		h1{margin:0 0 1rem;font-size:1.25rem}
		p{margin:0 0 1rem;color:var(--muted)}
		ul{list-style:none;padding:0;margin:0;display:flex;gap:0.5rem}
		a.button{display:inline-block;padding:0.6rem 1rem;border-radius:8px;background:var(--button-bg);color:var(--button-text);text-decoration:none}
		a.button:focus{outline:2px solid rgba(0,0,0,.12);outline-offset:2px}
	</style>
</head>
<body>
	<div class="container">
		<h1>Playground ナビ</h1>
		<p>テーマはシステム設定に従います（ダーク/ライト自動切替）。</p>
		<ul>
			<li><a class="button" href="/button">Button</a></li>
			<li><a class="button" href="/select">Select</a></li>
		</ul>
	</div>
</body>
</html>
